<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class = "main">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="text" id = "input-el" value="20">
        <button id = "convert-btn">Convert</button>
    </div>
    <div class = "conversion">
        <div id = "length">
            <h2>Length (Meter / Feet)</h2>
            <p id = "mtop-p">20 meters = 65.616 feet | 20 feet = 6.096 meters</p>
        </div>
        <div id = "volume">
            <h2>Volume (Liters / Gallons)</h2>
            <p id = "ltog-p" >20 liters = 5.284 gallons | 20 gallons = 75.708.liters</p>
        </div>
        <div id = "mass">
            <h2>Mass (Kilograms / pounds)</h2>
            <p id = "ktop-p">20 kilos = 44.002 pounds | 20 pounds = 9.072 kilos</p>
        </div>
    </div>
    

    <script src = "./index.js"></script>
</body>
</html>
